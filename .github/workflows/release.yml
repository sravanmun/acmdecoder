name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual runs for testing builds without publishing

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest -> Linux x86_64 (manylinux_2_28)
        # macos-13      -> macOS x86_64 (Intel)
        # macos-14      -> macOS arm64  (Apple Silicon)
        os: [ubuntu-latest, macos-13, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # only publish on tag pushes; workflow_dispatch builds wheels but skips upload
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/acmdecoder
    permissions:
      id-token: write   # required for PyPI trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
